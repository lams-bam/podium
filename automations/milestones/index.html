function Rv({ l, v, d }) {
	return <tr><td className="py-1 pr-3 whitespace-nowrap align-top" style={{ color: "#64748b", fontSize: 11 }}>{l}</td><td className="py-1" style={{ fontFamily: "monospace", fontSize: 11, color: d ? "#fbbf24" : "#cbd5e1", overflowWrap: "break-word", wordBreak: "normal" }}>{d && <span style={{ color: "#f59e0b", marginRight: 3 }}>●</span>}{v}</td></tr>;
}

}

function getSubject(vm, templateId) {
	const entry = SUBJECTS[templateId];
	if (!entry) return "—";
	if (entry.s) return entry.s;
	if (entry.p) return entry.v || "—";
	if (entry.d) {
		if (!vm) return entry.app || "—";
		if (vm.type === "App") return entry.app;
		if ((vm.reg || "").includes("Self") || (vm.reg || "").includes("Directed")) return entry.nas;
		if ((vm.reg || "").includes("School")) return entry.nai;
		return entry.app;
	}
	return "—";
}

										<p className="pl-10 font-semibold" style={{ color: "#fde68a" }}>→ "Time to Select Your Program Details"</p>
									</>) : (<>
										<p className="pl-2"><span style={{ color: "#818cf8" }}>{"{{#if v_schoolType}}"}</span> → truthy</p>
										<p className="pl-4"><span style={{ color: "#64748b" }}>{'{{#ifMatchesRegexStr "App School"}}'}</span> → no match</p>
										<p className="pl-4"><span style={{ color: "#86efac" }}>{'{{#ifMatchesRegexStr "No App School"}}'}</span> → <span style={{ color: "#86efac" }}>✓ match</span></p>
										<p className="pl-6"><span style={{ color: "#fb7185" }}>{'{{#ifMatchesRegexStr v_registrationMethod "Student.*"}}'}</span> → <span style={{ color: "#fb7185" }}>✗ no match</span></p>
										<p className="pl-6"><span style={{ color: "#86efac" }}>{"{{else}}"}</span></p>
										<p className="pl-8 font-semibold" style={{ color: "#fde68a" }}>→ "Last Step: Select Your Program Details!"</p>
									</>)}
								</div>
							</Sec>

							{/* CTA Button */}
							<Sec bg="#100d18" border="#231e35" accent="#c084fc" label="CTA Button">
								{/* Resolved values */}
								<div className="flex gap-2 mb-2.5">
									<div className="flex-1 px-2 py-1.5 rounded text-xs" style={{ background: "#1a1528", border: "1px solid #2d2545" }}>
										<div style={{ color: "#64748b", fontSize: 9 }}>Copy</div>
										<div className="font-semibold" style={{ color: "#c084fc" }}>{(vm.type === "App") ? "Complete Your Enrollment ➔" : "Select Program Details ➔"}</div>
									</div>
									<div className="flex-1 px-2 py-1.5 rounded text-xs" style={{ background: "#1a1528", border: "1px solid #2d2545" }}>
										<div style={{ color: "#64748b", fontSize: 9 }}>URL</div>
										<div className="font-semibold" style={{ color: "#fde68a" }}>{(vm.type === "App") ? "v_startNewAppLink" : "v_llForm"}</div>
									</div>
								</div>
								{/* Logic trace */}
								<div className="text-xs space-y-1" style={{ fontFamily: "monospace", color: "#64748b", fontSize: 10 }}>
									<p style={{ color: "#94a3b8" }}>Email - CTA - MKT Blasts v3:</p>
									<p className="pl-2">{"v_stage matches \"(Lead)\""}</p>
									{(vm.type === "App") ? (<>
										<p className="pl-4"><span style={{ color: "#86efac" }}>{"schoolType = \"App School\""}</span> → <span style={{ color: "#86efac" }}>✓</span></p>
										<p className="pl-6" style={{ color: "#67e8f9" }}>→ Email - CTA - Start New Application v2</p>
										<p className="pl-8"><span style={{ color: "#c084fc" }}>{"temp_copy = \"Complete Your Enrollment ➔\""}</span></p>
										<p className="pl-8"><span style={{ color: "#fde68a" }}>{"temp_dest = v_startNewAppLink"}</span></p>
									</>) : (<>
										<p className="pl-4"><span style={{ color: "#64748b" }}>{"schoolType = \"App School\""}</span> → <span style={{ color: "#fb7185" }}>✗</span></p>
										<p className="pl-4">{"regMethod ~ \"Student\"?"} <span style={{ color: (vm.reg || "").includes("Self") ? "#86efac" : "#fb7185" }}>{(vm.reg || "").includes("Self") ? "✓ match" : "✗ no match"}</span></p>
										<p className="pl-6" style={{ color: "#67e8f9" }}>→ Email - CTA - Select Livelab v2</p>
										<p className="pl-8"><span style={{ color: "#c084fc" }}>{"temp_copy = \"Select Program Details ➔\""}</span></p>
										<p className="pl-8"><span style={{ color: "#fde68a" }}>{"temp_dest = v_llForm"}</span></p>
									</>)}
								</div>
							</Sec>

							{/* Findings */}
							<Sec bg="#180d0d" border="#351c1c" accent="#fb7185" label="Findings">
								<span className="text-xs px-1.5 py-0.5 rounded" style={{ background: "#1f1215", color: "#64748b", fontSize: 9 }}>Snippets verified Mar 11</span>
								<div className="space-y-2 mt-2">
									<div className="px-2.5 py-2 rounded text-xs" style={{ background: "#0f1a0f", border: "1px solid #1a3a1a", color: "#86efac" }}>✅ <span className="font-semibold">Inline link regex fixed</span><span style={{ color: "#4b7a4b" }}> — now includes Lead (Mar 5)</span></div>
									<div className="px-2.5 py-2 rounded text-xs" style={{ background: "#1f140b", border: "1px solid #854d0e33", color: "#fbbf24" }}>⚠️ <span className="font-semibold">Unsubscribe inconsistent</span><span style={{ color: "#8a6d2a" }}> — messageTypeId varies. Verify CAN-SPAM.</span></div>
									<div className="px-2.5 py-2 rounded text-xs" style={{ background: "#141418", border: "1px solid #231e35", color: "#94a3b8" }}>ℹ️ <span className="font-semibold">No App: "1 min" vs App: "2 min"</span><span style={{ color: "#64748b" }}> — Intentional.</span></div>
								</div>
								<p className="text-xs mt-2" style={{ color: "#475569" }}>Run render_previews.py for full analysis.</p>
							</Sec>
						</div>

						{/* EMAIL PREVIEW */}
						<div className="flex-1 overflow-y-auto flex flex-col" style={{ background: "#0f1118", borderLeft: "1px solid #181c2a" }}>
							{/* Device toggle */}
							<div className="flex items-center justify-between px-4 py-2 flex-shrink-0" style={{ borderBottom: "1px solid #181c2a" }}>
								<span className="text-xs" style={{ color: "#475569" }}>{previewMode === "desktop" ? "600px" : "375px"}</span>
								<div className="flex rounded-md overflow-hidden" style={{ border: "1px solid #2a2f42" }}>
									<button onClick={() => setPreviewMode("desktop")} className="px-3 py-1 text-xs font-medium flex items-center gap-1.5" style={{ background: previewMode === "desktop" ? "#1e293b" : "transparent", color: previewMode === "desktop" ? "#e2e8f0" : "#64748b" }}>
										<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
										Desktop
									</button>
									<button onClick={() => setPreviewMode("mobile")} className="px-3 py-1 text-xs font-medium flex items-center gap-1.5" style={{ background: previewMode === "mobile" ? "#1e293b" : "transparent", color: previewMode === "mobile" ? "#e2e8f0" : "#64748b", borderLeft: "1px solid #2a2f42" }}>
										<svg width="12" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
										Mobile
									</button>
								</div>
							</div>
							{/* Preview frame */}
							<div className="flex-1 overflow-auto p-5" style={{ minWidth: 0 }}>
								<div className="flex justify-center">
								<div style={{ width: previewMode === "desktop" ? 600 : 375, minWidth: previewMode === "desktop" ? 600 : 375, flexShrink: 0, transition: "width 0.3s ease, min-width 0.3s ease" }}>
									<div className="rounded-t-lg px-4 py-3 flex items-center justify-between" style={{ background: "#181c2a" }}>
										<div className="flex items-center gap-2">
											<span className="text-xs font-medium" style={{ color: "#94a3b8" }}>{c.name}</span>
											{DATES[c.campaignId] && <span className="text-xs px-1.5 py-0.5 rounded" style={{ background: "#0f1118", color: "#64748b", fontSize: 9 }}>edited {DATES[c.campaignId]}</span>}
										</div>
										<span className="text-xs px-2 py-0.5 rounded" style={{ background: vm.color || "#333", color: "#fff", fontSize: 10 }}>{vm.school}</span>
									</div>
									<div className="px-4 py-2.5" style={{ background: "#f8f9fa", borderBottom: "1px solid #e2e8f0" }}>
										<div className="flex gap-1.5 mb-2">
											<div className="w-2 h-2 rounded-full" style={{ background: "#ff6059" }} />
											<div className="w-2 h-2 rounded-full" style={{ background: "#ffbd2e" }} />
											<div className="w-2 h-2 rounded-full" style={{ background: "#28c840" }} />
										</div>
										<table className="w-full" style={{ fontSize: 11, color: "#475569" }}><tbody>
											<tr><td className="py-0.5 pr-2 font-semibold text-right" style={{ width: 50, color: "#94a3b8" }}>From</td><td>{vm.prog || "Global Career Accelerator"}</td></tr>
											<tr><td className="py-0.5 pr-2 font-semibold text-right" style={{ color: "#94a3b8" }}>To</td><td>alex.johnson@test.edu</td></tr>
											<tr><td className="py-0.5 pr-2 font-semibold text-right" style={{ color: "#94a3b8" }}>Subject</td><td className="font-semibold" style={{ color: "#1e293b" }}>{subject}</td></tr>
										</tbody></table>
									</div>
									<div className="bg-white" style={{ minHeight: 400 }}>
									{(() => {
										const P = window.PREVIEWS || {};
										const keys = Object.keys(P);
										const match = keys.find(k => {
											const p = P[k];
											return p && p.templateId === c.templateId && p.variation === vk;
										});
										const prev = match ? P[match] : null;
										if (prev && prev.html) {
											return <iframe
												srcDoc={prev.html}
												style={{ width: "100%", minHeight: 600, border: "none" }}
												title="Email Preview"
												sandbox="allow-same-origin"
											/>;
										}
										const isFail = keys.some(k => P[k] && P[k].templateId === c.templateId && P[k].variation === vk && P[k].error);
										return <div className="px-8 py-12 text-center">
											<p className="text-sm font-semibold" style={{ color: isFail ? "#f87171" : "#475569" }}>
												{isFail ? "Preview failed to render" : "No preview available"}
											</p>
											<p className="text-xs mt-2" style={{ color: "#94a3b8" }}>
												Template {c.templateId} / {vk}
											</p>
											<p className="text-xs mt-1" style={{ color: "#64748b" }}>
												{keys.length} of 74 previews loaded
											</p>
										</div>;
									})()}
									</div>
									<div className="rounded-b-lg h-1.5" style={{ background: "#d4d8e0" }} />
								</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
		</div>
	);
}


// Mount
ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
